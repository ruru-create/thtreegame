<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>成語填字</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #ead8aa;
      --paper-2: #f6e9c5;
      --ink: #221713;
      --muted: #735d45;
      --red: #b52220;
      --red-2: #e04735;
      --green: #2f8f52;
      --wood: #e8c883;
      --wood-2: #f5dea4;
      --line: rgba(120, 75, 30, 0.28);
      --shadow: 0 18px 44px rgba(74, 45, 18, 0.20);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Noto Serif TC', 'PMingLiU', serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.34), transparent 22rem),
        radial-gradient(circle at 82% 10%, rgba(181, 34, 32, 0.08), transparent 24rem),
        linear-gradient(135deg, #e7d19f, #f8edcb 48%, #dfc28a);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.32;
      background-image:
        linear-gradient(35deg, rgba(97, 67, 37, 0.10) 1px, transparent 1px),
        linear-gradient(115deg, rgba(97, 67, 37, 0.08) 1px, transparent 1px),
        radial-gradient(circle, rgba(97, 67, 37, 0.13) 1px, transparent 1px);
      background-size: 52px 52px, 64px 64px, 18px 18px;
      mix-blend-mode: multiply;
    }

    .page {
      position: relative;
      width: min(1080px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1, h2, p { margin: 0; }

    h1 {
      font-size: clamp(2.25rem, 7vw, 5rem);
      line-height: 1;
      letter-spacing: 0.14em;
      color: #26130c;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.28);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .progress {
      min-width: 136px;
      padding: 12px 14px;
      border: 2px solid rgba(181, 34, 32, 0.52);
      border-radius: 12px;
      background: rgba(246, 233, 197, 0.72);
      box-shadow: inset 0 0 18px rgba(181, 34, 32, 0.06);
      text-align: center;
      font-weight: 900;
      color: var(--red);
    }

    .scroll {
      border: 2px solid rgba(120, 75, 30, 0.32);
      border-radius: 18px;
      background: rgba(255, 247, 220, 0.78);
      box-shadow: var(--shadow), inset 0 0 40px rgba(120, 75, 30, 0.07);
      overflow: hidden;
    }

    .question-area {
      display: grid;
      gap: 18px;
      justify-items: center;
      padding: clamp(22px, 5vw, 42px) 18px 26px;
      border-bottom: 1px solid var(--line);
    }

    .idiom {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: clamp(8px, 2vw, 14px);
      min-height: 98px;
    }

    .char, .blank {
      width: clamp(62px, 13vw, 92px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      font-size: clamp(2.2rem, 8vw, 4.3rem);
      font-weight: 900;
      line-height: 1;
    }

    .char {
      color: var(--ink);
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.36);
    }

    .blank {
      position: relative;
      border: 3px solid var(--red);
      border-radius: 8px;
      background:
        linear-gradient(45deg, transparent 49%, rgba(181, 34, 32, 0.30) 50%, transparent 51%),
        linear-gradient(-45deg, transparent 49%, rgba(181, 34, 32, 0.30) 50%, transparent 51%),
        linear-gradient(90deg, transparent 48%, rgba(181, 34, 32, 0.22) 49%, rgba(181, 34, 32, 0.22) 51%, transparent 52%),
        linear-gradient(0deg, transparent 48%, rgba(181, 34, 32, 0.22) 49%, rgba(181, 34, 32, 0.22) 51%, transparent 52%),
        rgba(255, 246, 216, 0.82);
      color: rgba(181, 34, 32, 0.34);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .blank.over {
      transform: translateY(-3px);
      box-shadow: 0 0 0 4px rgba(181, 34, 32, 0.12), 0 10px 22px rgba(181, 34, 32, 0.18);
    }

    .blank.filled {
      color: var(--red);
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.35), 0 0 16px rgba(181, 34, 32, 0.24);
      background:
        linear-gradient(45deg, transparent 49%, rgba(181, 34, 32, 0.24) 50%, transparent 51%),
        linear-gradient(-45deg, transparent 49%, rgba(181, 34, 32, 0.24) 50%, transparent 51%),
        rgba(255, 241, 205, 0.96);
      animation: stamp 240ms ease-out;
    }

    .blank.wrong {
      animation: wrong 200ms ease;
    }

    @keyframes stamp {
      0% { transform: scale(1.34) rotate(-3deg); opacity: 0.58; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes wrong {
      0%, 100% { box-shadow: none; transform: translateX(0); }
      50% { box-shadow: 0 0 26px rgba(224, 71, 53, 0.72); transform: translateX(5px); }
    }

    .result {
      min-height: 92px;
      display: none;
      width: min(760px, 100%);
      padding: 16px 18px;
      border: 2px solid rgba(47, 143, 82, 0.42);
      border-radius: 14px;
      background: rgba(235, 247, 220, 0.78);
      color: #20452d;
      text-align: center;
    }

    .result.show { display: grid; gap: 8px; }
    .result strong { font-size: 1.35rem; color: var(--green); }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      min-height: 44px;
      padding: 8px 18px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, #c9382d, #92211b);
      color: #fff8e2;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(181, 34, 32, 0.22);
    }

    button:active { transform: scale(0.97); }

    .cards-area {
      padding: 22px;
    }

    .cards-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 900;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .tile {
      min-height: 64px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(120, 75, 30, 0.34);
      border-radius: 12px;
      background:
        linear-gradient(90deg, rgba(120, 75, 30, 0.07), transparent 26%, rgba(120, 75, 30, 0.06) 54%, transparent),
        linear-gradient(180deg, var(--wood-2), var(--wood));
      color: #1e130f;
      font-size: 2rem;
      font-weight: 900;
      cursor: grab;
      user-select: none;
      touch-action: none;
      box-shadow: 0 9px 18px rgba(87, 51, 17, 0.16), inset 0 0 18px rgba(255, 255, 255, 0.20);
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .tile.dragging {
      opacity: 0.55;
      transform: scale(0.96);
    }

    .tile.correct {
      background: linear-gradient(180deg, #bfe7be, #73ba7e);
      color: #174326;
      cursor: default;
      opacity: 0.55;
    }

    .tile.wrong {
      animation: tileWrong 200ms ease;
    }

    @keyframes tileWrong {
      50% { box-shadow: 0 0 24px rgba(224, 71, 53, 0.82); transform: translateY(-4px); }
    }

    .final {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(75, 45, 18, 0.36);
      backdrop-filter: blur(7px);
      z-index: 20;
    }

    .final.show { display: grid; }

    .final-box {
      width: min(92vw, 440px);
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 30px;
      border: 3px solid var(--red);
      border-radius: 18px;
      background: rgba(255, 247, 220, 0.96);
      box-shadow: 0 24px 80px rgba(74, 45, 18, 0.28);
      text-align: center;
    }

    .final-box h2 {
      color: var(--red);
      font-size: 2.4rem;
    }

    .drag-ghost {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--wood-2), var(--wood));
      color: #1e130f;
      font-size: 2rem;
      font-weight: 900;
      box-shadow: 0 16px 32px rgba(87, 51, 17, 0.30);
      transform: translate(-50%, -50%);
    }

    @media (max-width: 760px) {
      header { flex-direction: column; align-items: stretch; }
      .progress { text-align: left; }
      .cards-area { padding: 18px 14px; }
      .cards {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 8px;
        scroll-snap-type: x proximity;
      }
      .tile {
        flex: 0 0 76px;
        min-height: 76px;
        scroll-snap-align: start;
      }
    }
  
    .map-back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 9999;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.62);
      color: #fff;
      font: 700 14px/1.2 "Microsoft JhengHei", system-ui, sans-serif;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
    }
    .map-back-btn:hover { filter: brightness(1.12); }
  </style>
</head>
<body>
  <a class="map-back-btn" href="../大冒險地圖/index.html">← 回到大地圖</a>

  <div class="page">
    <header>
      <div>
        <h1>成語填字</h1>
        <p class="subtitle">拖曳字卡，補完成語缺字。每場隨機五題。</p>
      </div>
      <div class="progress" id="progress">第 1 / 5 題</div>
    </header>

    <main class="scroll">
      <section class="question-area">
        <div class="idiom" id="idiom" aria-label="成語題目"></div>
        <div class="result" id="result">
          <strong>✓ 答對！</strong>
          <p id="meaning"></p>
          <div class="actions"><button id="nextBtn">下一題</button></div>
        </div>
      </section>

      <section class="cards-area">
        <div class="cards-title">
          <span>字卡</span>
          <span>拖到上方紅色方框</span>
        </div>
        <div class="cards" id="cards"></div>
      </section>
    </main>
  </div>

  <div class="final" id="final" role="dialog" aria-modal="true" aria-labelledby="finalTitle">
    <div class="final-box">
      <h2 id="finalTitle">挑戰完成</h2>
      <p id="scoreText">總成績：5 / 5</p>
      <button id="restartBtn">重新挑戰</button>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { 成語: '一鳴驚人', 缺字: [1, 2], 答案: ['鳴', '驚'], 意思: '比喻平時默默無聞，突然有驚人表現。' },
      { 成語: '風花雪月', 缺字: [1, 3], 答案: ['花', '月'], 意思: '原指四時景色，後比喻浮華空洞的詩文。' },
      { 成語: '三番五次', 缺字: [1, 3], 答案: ['番', '次'], 意思: '形容次數很多。' },
      { 成語: '一字千金', 缺字: [1, 3], 答案: ['字', '金'], 意思: '形容文字價值極高。' },
      { 成語: '畫龍點睛', 缺字: [1, 3], 答案: ['龍', '睛'], 意思: '比喻在關鍵處點明要旨。' },
      { 成語: '亡羊補牢', 缺字: [1, 3], 答案: ['羊', '牢'], 意思: '比喻出了差錯後及時補救，還不算太晚。' },
      { 成語: '守株待兔', 缺字: [1, 3], 答案: ['株', '兔'], 意思: '比喻拘泥舊法，不知變通或妄想不勞而獲。' },
      { 成語: '滄海桑田', 缺字: [1, 3], 答案: ['海', '田'], 意思: '比喻世事變化極大。' },
      { 成語: '杯弓蛇影', 缺字: [1, 2], 答案: ['弓', '蛇'], 意思: '比喻疑神疑鬼，自相驚擾。' },
      { 成語: '刻舟求劍', 缺字: [1, 3], 答案: ['舟', '劍'], 意思: '比喻拘泥成例，不知情勢已變。' },
      { 成語: '狐假虎威', 缺字: [1, 2], 答案: ['假', '虎'], 意思: '比喻仰仗別人的權勢來欺壓人。' },
      { 成語: '雪中送炭', 缺字: [1, 3], 答案: ['中', '炭'], 意思: '比喻在別人急需時給予幫助。' }
    ];

    const DISTRACTORS = '天地日月山水風雲花雪金玉龍虎馬鳥魚竹松梅蘭書筆心意明清春秋東西南北仁義禮智信安康樂福'.split('');
    const idiomEl = document.getElementById('idiom');
    const cardsEl = document.getElementById('cards');
    const progressEl = document.getElementById('progress');
    const resultEl = document.getElementById('result');
    const meaningEl = document.getElementById('meaning');
    const nextBtn = document.getElementById('nextBtn');
    const finalEl = document.getElementById('final');
    const scoreText = document.getElementById('scoreText');
    const restartBtn = document.getElementById('restartBtn');

    let roundQuestions = [];
    let current = 0;
    let correctCount = 0;
    let placed = {};
    let audioCtx;
    let touchDrag = null;

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playBell() {
      const audio = getAudio();
      const now = audio.currentTime;
      [740, 980, 1320].forEach((freq, i) => {
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + i * 0.035);
        gain.gain.setValueAtTime(0.0001, now + i * 0.035);
        gain.gain.exponentialRampToValueAtTime(0.09, now + i * 0.035 + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28 + i * 0.02);
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start(now + i * 0.035);
        osc.stop(now + 0.32 + i * 0.02);
      });
    }

    function startGame() {
      roundQuestions = shuffle(QUESTIONS).slice(0, 5);
      current = 0;
      correctCount = 0;
      finalEl.classList.remove('show');
      loadQuestion();
    }

    function loadQuestion() {
      placed = {};
      const q = roundQuestions[current];
      progressEl.textContent = '第 ' + (current + 1) + ' / 5 題';
      resultEl.classList.remove('show');
      idiomEl.innerHTML = '';
      cardsEl.innerHTML = '';

      [...q.成語].forEach((char, index) => {
        if (q.缺字.includes(index)) {
          const blank = document.createElement('div');
          blank.className = 'blank';
          blank.textContent = '□';
          blank.dataset.index = index;
          const answerIndex = q.缺字.indexOf(index);
          blank.dataset.answer = q.答案[answerIndex];
          setupBlank(blank);
          idiomEl.appendChild(blank);
        } else {
          const box = document.createElement('div');
          box.className = 'char';
          box.textContent = char;
          idiomEl.appendChild(box);
        }
      });

      const distractors = shuffle(DISTRACTORS.filter(ch => !q.答案.includes(ch))).slice(0, 13);
      const tiles = shuffle([...q.答案, ...distractors]);
      tiles.forEach((char, index) => cardsEl.appendChild(createTile(char, index)));
    }

    function createTile(char, index) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = char;
      tile.draggable = true;
      tile.dataset.char = char;
      tile.dataset.tileId = 't' + current + '-' + index;

      tile.addEventListener('dragstart', event => {
        getAudio();
        if (tile.classList.contains('correct')) return event.preventDefault();
        tile.classList.add('dragging');
        event.dataTransfer.setData('text/plain', tile.dataset.tileId);
        event.dataTransfer.effectAllowed = 'move';
      });

      tile.addEventListener('dragend', () => tile.classList.remove('dragging'));
      tile.addEventListener('pointerdown', event => beginTouchDrag(event, tile));
      return tile;
    }

    function setupBlank(blank) {
      blank.addEventListener('dragover', event => {
        event.preventDefault();
        if (!blank.classList.contains('filled')) blank.classList.add('over');
      });

      blank.addEventListener('dragleave', () => blank.classList.remove('over'));

      blank.addEventListener('drop', event => {
        event.preventDefault();
        blank.classList.remove('over');
        const tileId = event.dataTransfer.getData('text/plain');
        const tile = document.querySelector('[data-tile-id="' + tileId + '"]');
        if (tile) checkDrop(tile, blank);
      });
    }

    function beginTouchDrag(event, tile) {
      if (event.pointerType === 'mouse' || tile.classList.contains('correct')) return;
      getAudio();
      event.preventDefault();
      tile.setPointerCapture?.(event.pointerId);
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.textContent = tile.textContent;
      document.body.appendChild(ghost);
      tile.classList.add('dragging');
      touchDrag = { tile, ghost, pointerId: event.pointerId };
      moveGhost(event.clientX, event.clientY);
    }

    document.addEventListener('pointermove', event => {
      if (!touchDrag || event.pointerId !== touchDrag.pointerId) return;
      event.preventDefault();
      moveGhost(event.clientX, event.clientY);
      document.querySelectorAll('.blank').forEach(b => b.classList.remove('over'));
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.blank');
      if (target && !target.classList.contains('filled')) target.classList.add('over');
    }, { passive: false });

    document.addEventListener('pointerup', event => {
      if (!touchDrag || event.pointerId !== touchDrag.pointerId) return;
      const { tile, ghost } = touchDrag;
      document.querySelectorAll('.blank').forEach(b => b.classList.remove('over'));
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.blank');
      if (target) checkDrop(tile, target);
      tile.classList.remove('dragging');
      ghost.remove();
      touchDrag = null;
    });

    function moveGhost(x, y) {
      if (!touchDrag) return;
      touchDrag.ghost.style.left = x + 'px';
      touchDrag.ghost.style.top = y + 'px';
    }

    function checkDrop(tile, blank) {
      if (blank.classList.contains('filled') || tile.classList.contains('correct')) return;
      if (tile.dataset.char === blank.dataset.answer) {
        blank.textContent = tile.dataset.char;
        blank.classList.add('filled');
        tile.classList.add('correct');
        tile.draggable = false;
        placed[blank.dataset.index] = true;
        playBell();
        if (Object.keys(placed).length === roundQuestions[current].缺字.length) completeQuestion();
      } else {
        flashWrong(tile, blank);
      }
    }

    function flashWrong(tile, blank) {
      tile.classList.remove('wrong');
      blank.classList.remove('wrong');
      void tile.offsetWidth;
      tile.classList.add('wrong');
      blank.classList.add('wrong');
      setTimeout(() => {
        tile.classList.remove('wrong');
        blank.classList.remove('wrong');
      }, 220);
    }

    function completeQuestion() {
      correctCount += 1;
      meaningEl.textContent = roundQuestions[current].意思;
      nextBtn.textContent = current === 4 ? '看總成績' : '下一題';
      resultEl.classList.add('show');
    }

    nextBtn.addEventListener('click', () => {
      current += 1;
      if (current >= 5) {
        try { localStorage.setItem('cert_idiom', '1'); } catch (error) {}
      scoreText.textContent = '總成績：' + correctCount + ' / 5';
        finalEl.classList.add('show');
      } else {
        loadQuestion();
      }
    });

    restartBtn.addEventListener('click', startGame);
    document.addEventListener('pointerdown', getAudio, { once: true });
    startGame();
  </script>
</body>
</html>
