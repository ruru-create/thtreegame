<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>大冒險地圖</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10131f;
      --panel: rgba(24, 32, 52, 0.88);
      --panel2: #232d48;
      --ink: #fff7df;
      --muted: #c9bfa8;
      --gold: #ffd166;
      --green: #52e27d;
      --red: #ff5c6c;
      --blue: #74d8ff;
      --purple: #c084fc;
      --line: rgba(255, 209, 102, 0.24);
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 209, 102, 0.18), transparent 26rem),
        radial-gradient(circle at 82% 18%, rgba(116, 216, 255, 0.16), transparent 28rem),
        radial-gradient(circle at 50% 92%, rgba(192, 132, 252, 0.16), transparent 28rem),
        linear-gradient(160deg, #090d18, #151c2f 52%, #080b14);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle, black, transparent 78%);
    }

    .page {
      position: relative;
      width: min(1120px, calc(100% - 30px));
      margin: 0 auto;
      padding: 28px 0 46px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(2.35rem, 7vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 5px 0 rgba(0,0,0,.26), 0 0 32px rgba(255,209,102,.26);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      font-weight: 700;
    }

    button, .stage-card {
      font: inherit;
    }

    .clear-btn, .door-btn, .again-btn, .close-btn {
      min-height: 44px;
      border: 0;
      border-radius: 14px;
      padding: 9px 15px;
      background: linear-gradient(180deg, #ffd166, #d49a2e);
      color: #20150a;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,.24);
    }

    .clear-btn {
      background: rgba(255,255,255,.08);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .map-panel {
      display: grid;
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow), inset 0 0 38px rgba(255,209,102,.05);
    }

    .stages {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .stage-card {
      min-height: 250px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 12px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.035));
      color: var(--ink);
      text-decoration: none;
      box-shadow: 0 14px 32px rgba(0,0,0,.20);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .stage-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,209,102,.52);
      box-shadow: 0 18px 42px rgba(0,0,0,.24), 0 0 26px rgba(255,209,102,.12);
    }

    .stage-card.done {
      border-color: rgba(82,226,125,.66);
      background: linear-gradient(180deg, rgba(82,226,125,.18), rgba(255,255,255,.045));
      box-shadow: 0 14px 32px rgba(0,0,0,.20), 0 0 28px rgba(82,226,125,.14);
    }

    .stage-icon { font-size: 4.4rem; line-height: 1; }
    .stage-card h2 { font-size: 1.45rem; }
    .status { color: var(--muted); font-weight: 900; }
    .done .status { color: var(--green); }

    .door-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 18px;
      border: 1px dashed rgba(255,209,102,.36);
      border-radius: 18px;
      background: rgba(0,0,0,.16);
    }

    .count {
      color: var(--gold);
      font-size: 1.1rem;
      font-weight: 900;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(5, 8, 15, 0.78);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .modal.show { display: grid; }

    .door-box {
      width: min(940px, 100%);
      max-height: min(92vh, 820px);
      overflow: auto;
      display: grid;
      gap: 18px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #162035;
      box-shadow: var(--shadow), 0 0 50px rgba(255,209,102,.12);
    }

    .door-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .slot {
      min-height: 145px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 14px;
      border: 2px dashed rgba(255,209,102,.38);
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      color: var(--muted);
      transition: box-shadow 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .slot.over { border-color: var(--blue); box-shadow: 0 0 24px rgba(116,216,255,.18); }
    .slot.correct { border-style: solid; border-color: rgba(82,226,125,.78); background: rgba(82,226,125,.11); color: var(--green); }
    .slot.wrong { animation: wrong 300ms ease; }
    @keyframes wrong { 50% { border-color: var(--red); box-shadow: 0 0 28px rgba(255,92,108,.52); transform: translateX(6px); } }

    .slot-label { font-size: 1.1rem; font-weight: 900; }

    .bag {
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(255,255,255,.045);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 78px;
    }

    .badge {
      min-width: 136px;
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(255,209,102,.46);
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd166, #c58d2d);
      color: #20150a;
      font-weight: 1000;
      cursor: grab;
      touch-action: none;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      user-select: none;
    }

    .badge.placed {
      cursor: default;
      background: linear-gradient(180deg, #86efac, #36b867);
    }

    .empty-bag { color: var(--muted); padding: 10px 0; }

    .win {
      display: none;
      justify-items: center;
      gap: 14px;
      padding: 26px;
      border: 1px solid rgba(255,209,102,.52);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,209,102,.18), rgba(255,255,255,.05));
      text-align: center;
    }

    .win.show { display: grid; }
    .win h2 { font-size: clamp(2rem, 6vw, 3.4rem); }
    .time { color: var(--gold); font-size: 1.45rem; font-weight: 1000; }

    .ghost {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: .92;
    }

    @media (max-width: 820px) {
      header, .door-head { flex-direction: column; }
      .stages, .slots { grid-template-columns: 1fr; }
      .stage-card { min-height: 190px; }
      .badges { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 6px; }
      .badge { flex: 0 0 auto; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>大冒險地圖</h1>
        <p class="subtitle">完成 3 個關卡，拿到 3 個憑證解開大門</p>
      </div>
      <button class="clear-btn" id="clearBtn">🔄 清除進度</button>
    </header>

    <section class="map-panel">
      <div class="stages" id="stages"></div>
      <div class="door-row">
        <button class="door-btn" id="doorBtn">🔒 通關大門</button>
        <span class="count" id="certCount">目前持有：0 / 3</span>
      </div>
    </section>
  </main>

  <section class="modal" id="doorModal" aria-modal="true" role="dialog" aria-labelledby="doorTitle">
    <div class="door-box">
      <div class="door-head">
        <div>
          <h2 id="doorTitle">通關大門</h2>
          <p class="subtitle">把憑證拖到正確凹槽。三個都放對，大門就會開啟。</p>
        </div>
        <button class="close-btn" id="closeDoor">關閉</button>
      </div>

      <div id="doorGame">
        <div class="slots" id="slots"></div>
        <div class="bag">
          <h3>背包欄</h3>
          <div class="badges" id="badges"></div>
        </div>
      </div>

      <div class="win" id="winPanel">
        <h2>🏆 冒險完成！</h2>
        <p>總冒險時長</p>
        <div class="time" id="timeText">00 分 00 秒</div>
        <button class="again-btn" id="againBtn">再次冒險</button>
      </div>
    </div>
  </section>

  <script>
    const LEVELS = [
      { key: 'cert_dynasty', type: 'dynasty', label: '朝代', seal: '朝代之印', icon: '🎴', title: '朝代配對', href: '../示範1_朝代配對/index.html' },
      { key: 'cert_idiom', type: 'idiom', label: '成語', seal: '成語之印', icon: '📝', title: '成語填字', href: '../示範2_成語填字/index.html' },
      { key: 'cert_warrior', type: 'warrior', label: '勇者', seal: '勇者之印', icon: '⚔️', title: '打怪 RPG', href: '../示範3_打怪RPG/index.html' }
    ];

    const stagesEl = document.getElementById('stages');
    const certCountEl = document.getElementById('certCount');
    const doorModal = document.getElementById('doorModal');
    const slotsEl = document.getElementById('slots');
    const badgesEl = document.getElementById('badges');
    const doorGame = document.getElementById('doorGame');
    const winPanel = document.getElementById('winPanel');
    const timeText = document.getElementById('timeText');
    let touchDrag = null;

    function ensureStartTime() {
      if (!localStorage.getItem('adventure_start')) localStorage.setItem('adventure_start', String(Date.now()));
    }

    function hasCert(level) {
      return localStorage.getItem(level.key) === '1';
    }

    function renderMap() {
      ensureStartTime();
      stagesEl.innerHTML = '';
      let count = 0;
      LEVELS.forEach((level, index) => {
        const done = hasCert(level);
        if (done) count += 1;
        const card = document.createElement('a');
        card.className = 'stage-card' + (done ? ' done' : '');
        card.href = level.href;
        card.innerHTML = '<div class="stage-icon">' + level.icon + '</div><h2>關卡 ' + (index + 1) + '：' + level.title + '</h2><div class="status">' + (done ? '已完成 ✓' : '未完成') + '</div>';
        stagesEl.appendChild(card);
      });
      certCountEl.textContent = '目前持有：' + count + ' / 3';
    }

    function openDoor() {
      doorModal.classList.add('show');
      doorGame.style.display = '';
      winPanel.classList.remove('show');
      renderDoorGame();
    }

    function renderDoorGame() {
      slotsEl.innerHTML = '';
      badgesEl.innerHTML = '';
      LEVELS.forEach(level => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.dataset.type = level.type;
        slot.innerHTML = '<div class="slot-label">' + level.label + '</div><div>等待憑證</div>';
        setupSlot(slot);
        slotsEl.appendChild(slot);
      });

      const held = LEVELS.filter(hasCert);
      if (!held.length) {
        badgesEl.innerHTML = '<div class="empty-bag">目前沒有憑證。先完成關卡，再回來試著開門。</div>';
      } else {
        held.forEach(level => badgesEl.appendChild(createBadge(level)));
      }
    }

    function createBadge(level) {
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.draggable = true;
      badge.dataset.type = level.type;
      badge.innerHTML = '<span>' + level.icon + '</span><span>' + level.seal + '</span>';
      badge.addEventListener('dragstart', event => {
        if (badge.classList.contains('placed')) return event.preventDefault();
        event.dataTransfer.setData('text/plain', level.type);
        event.dataTransfer.effectAllowed = 'move';
      });
      badge.addEventListener('pointerdown', event => beginTouchDrag(event, badge));
      return badge;
    }

    function setupSlot(slot) {
      slot.addEventListener('dragover', event => {
        event.preventDefault();
        if (!slot.classList.contains('correct')) slot.classList.add('over');
      });
      slot.addEventListener('dragleave', () => slot.classList.remove('over'));
      slot.addEventListener('drop', event => {
        event.preventDefault();
        slot.classList.remove('over');
        const type = event.dataTransfer.getData('text/plain');
        const badge = badgesEl.querySelector('.badge[data-type="' + type + '"]');
        tryPlace(badge, slot);
      });
    }

    function tryPlace(badge, slot) {
      if (!badge || !slot || slot.classList.contains('correct') || badge.classList.contains('placed')) return;
      if (badge.dataset.type === slot.dataset.type) {
        slot.classList.add('correct');
        slot.innerHTML = '';
        badge.classList.add('placed');
        badge.draggable = false;
        slot.appendChild(badge);
        checkDoorComplete();
      } else {
        slot.classList.remove('wrong');
        void slot.offsetWidth;
        slot.classList.add('wrong');
        setTimeout(() => slot.classList.remove('wrong'), 320);
      }
    }

    function checkDoorComplete() {
      if (slotsEl.querySelectorAll('.slot.correct').length === 3) {
        setTimeout(showWin, 400);
      }
    }

    function showWin() {
      doorGame.style.display = 'none';
      winPanel.classList.add('show');
      const start = Number(localStorage.getItem('adventure_start') || Date.now());
      const total = Math.max(0, Math.floor((Date.now() - start) / 1000));
      const mm = String(Math.floor(total / 60)).padStart(2, '0');
      const ss = String(total % 60).padStart(2, '0');
      timeText.textContent = mm + ' 分 ' + ss + ' 秒';
    }

    function clearProgress() {
      ['cert_dynasty', 'cert_idiom', 'cert_warrior', 'adventure_start'].forEach(key => localStorage.removeItem(key));
      renderMap();
      if (doorModal.classList.contains('show')) renderDoorGame();
    }

    function beginTouchDrag(event, badge) {
      if (event.pointerType === 'mouse' || badge.classList.contains('placed')) return;
      event.preventDefault();
      const ghost = badge.cloneNode(true);
      ghost.classList.add('ghost');
      document.body.appendChild(ghost);
      touchDrag = { badge, ghost, pointerId: event.pointerId };
      moveGhost(event.clientX, event.clientY);
      badge.style.opacity = '0.45';
    }

    document.addEventListener('pointermove', event => {
      if (!touchDrag || touchDrag.pointerId !== event.pointerId) return;
      event.preventDefault();
      moveGhost(event.clientX, event.clientY);
      document.querySelectorAll('.slot').forEach(slot => slot.classList.remove('over'));
      const slot = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.slot');
      if (slot && !slot.classList.contains('correct')) slot.classList.add('over');
    }, { passive: false });

    document.addEventListener('pointerup', event => {
      if (!touchDrag || touchDrag.pointerId !== event.pointerId) return;
      const { badge, ghost } = touchDrag;
      document.querySelectorAll('.slot').forEach(slot => slot.classList.remove('over'));
      const slot = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.slot');
      tryPlace(badge, slot);
      badge.style.opacity = '';
      ghost.remove();
      touchDrag = null;
    });

    function moveGhost(x, y) {
      if (!touchDrag) return;
      touchDrag.ghost.style.left = x + 'px';
      touchDrag.ghost.style.top = y + 'px';
    }

    document.getElementById('doorBtn').addEventListener('click', openDoor);
    document.getElementById('closeDoor').addEventListener('click', () => doorModal.classList.remove('show'));
    document.getElementById('clearBtn').addEventListener('click', clearProgress);
    document.getElementById('againBtn').addEventListener('click', () => { clearProgress(); doorModal.classList.remove('show'); });
    renderMap();
  </script>
</body>
</html>
