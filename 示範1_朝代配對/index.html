<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>朝代配對</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #17100d;
      --ink: #f9ecd4;
      --muted: #d4bea0;
      --gold: #d8a63f;
      --gold-2: #ffe09a;
      --red: #b9362d;
      --red-2: #ff6b55;
      --deep: #241611;
      --paper: #f1dfbc;
      --paper-2: #e4c996;
      --green: #3ea15d;
      --line: rgba(216, 166, 63, 0.38);
      --shadow: 0 18px 54px rgba(0, 0, 0, 0.36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif TC", "PMingLiU", "MingLiU", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 10%, rgba(216, 166, 63, 0.16), transparent 28rem),
        radial-gradient(circle at 88% 28%, rgba(185, 54, 45, 0.16), transparent 26rem),
        linear-gradient(160deg, #120b09, #21130f 48%, #0e0908);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(90deg, rgba(216, 166, 63, 0.045) 1px, transparent 1px),
        linear-gradient(rgba(216, 166, 63, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle, black 0%, transparent 78%);
    }

    .page {
      position: relative;
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: 0.08em;
      color: var(--gold-2);
      text-shadow: 0 0 22px rgba(216, 166, 63, 0.38);
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 1rem;
    }

    .stats {
      min-width: 150px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 13, 10, 0.74);
      box-shadow: inset 0 0 18px rgba(216, 166, 63, 0.08);
      text-align: right;
    }

    .stats span {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
    }

    #attempts {
      color: var(--gold-2);
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
    }

    .game {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(28, 16, 12, 0.82);
      box-shadow: var(--shadow), inset 0 0 30px rgba(216, 166, 63, 0.06);
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(216, 166, 63, 0.16), rgba(185, 54, 45, 0.10));
    }

    .panel-title h2 {
      color: var(--gold-2);
      font-size: 1.1rem;
      letter-spacing: 0.08em;
    }

    .panel-note {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .dynasties {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .dynasty-card {
      min-height: 196px;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 2px solid var(--gold);
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(255, 224, 154, 0.92), rgba(228, 201, 150, 0.94)),
        var(--paper);
      color: #2c1710;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.20);
    }

    .dynasty-name {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 58px;
      border-bottom: 1px solid rgba(104, 64, 20, 0.24);
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      background: rgba(255, 255, 255, 0.20);
    }

    .drop-zone {
      min-height: 126px;
      display: flex;
      align-content: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .drop-zone::before {
      content: "拖曳事件至此";
      color: rgba(44, 23, 16, 0.42);
      font-size: 0.9rem;
      width: 100%;
      text-align: center;
      align-self: center;
    }

    .drop-zone.has-cards::before { display: none; }
    .drop-zone.over {
      background: rgba(216, 166, 63, 0.22);
      box-shadow: inset 0 0 0 2px rgba(185, 54, 45, 0.26);
    }

    .events-panel { position: sticky; top: 14px; }

    .events {
      display: grid;
      gap: 10px;
      padding: 16px;
      min-height: 560px;
    }

    .event-card {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 107, 85, 0.64);
      border-radius: 9px;
      background: linear-gradient(180deg, #2a1512, #1b100e);
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22), inset 0 0 16px rgba(185, 54, 45, 0.10);
      cursor: grab;
      user-select: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .event-card:active { cursor: grabbing; }
    .event-card.dragging { opacity: 0.45; transform: scale(0.98); }

    .event-card .icon {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(216, 166, 63, 0.16);
      font-size: 1.1rem;
    }

    .event-card .text {
      font-weight: 700;
      line-height: 1.35;
    }

    .event-card.correct {
      min-height: 34px;
      padding: 6px 8px;
      gap: 6px;
      border-color: rgba(62, 161, 93, 0.84);
      background: linear-gradient(180deg, #245735, #173721);
      box-shadow: 0 0 16px rgba(62, 161, 93, 0.22);
      cursor: default;
      font-size: 0.86rem;
    }

    .event-card.correct .icon {
      width: 24px;
      height: 24px;
      font-size: 0.95rem;
    }

    .event-card.wrong {
      animation: wrongFlash 300ms ease;
    }

    @keyframes wrongFlash {
      0%, 100% { transform: translateX(0); box-shadow: 0 0 0 rgba(255, 107, 85, 0); }
      25% { transform: translateX(-7px); box-shadow: 0 0 24px rgba(255, 107, 85, 0.72); }
      50% { transform: translateX(7px); border-color: #ffdfd8; }
      75% { transform: translateX(-4px); box-shadow: 0 0 24px rgba(255, 107, 85, 0.52); }
    }

    .empty-message {
      display: none;
      place-items: center;
      min-height: 190px;
      color: var(--muted);
      border: 1px dashed rgba(216, 166, 63, 0.34);
      border-radius: 10px;
    }

    .events.done .empty-message { display: grid; }

    .win-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(10, 6, 4, 0.76);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .win-overlay.show {
      display: grid;
      animation: goldenIn 600ms ease-out;
    }

    @keyframes goldenIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .win-box {
      width: min(92vw, 430px);
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 28px;
      border: 2px solid var(--gold-2);
      border-radius: 14px;
      background: linear-gradient(180deg, #2a180f, #170d09);
      box-shadow: 0 0 44px rgba(255, 224, 154, 0.44), 0 0 100px rgba(216, 166, 63, 0.20);
      text-align: center;
    }

    .win-box h2 {
      color: var(--gold-2);
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      text-shadow: 0 0 24px rgba(255, 224, 154, 0.52);
    }

    .win-box p { color: var(--muted); }

    .again {
      min-height: 44px;
      padding: 9px 18px;
      border: 1px solid var(--gold-2);
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold-2), var(--gold));
      color: #21130f;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      body { overflow-x: hidden; }
      header { align-items: stretch; flex-direction: column; }
      .stats { text-align: left; }
      .game { grid-template-columns: 1fr; }
      .events-panel { position: static; }
      .dynasties { grid-template-columns: 1fr; }
      .events {
        display: flex;
        min-height: 112px;
        overflow-x: auto;
        gap: 10px;
        scroll-snap-type: x proximity;
        padding-bottom: 18px;
      }
      .event-card {
        flex: 0 0 min(74vw, 280px);
        scroll-snap-align: start;
      }
      .empty-message { flex: 0 0 100%; }
    }
  
    .map-back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 9999;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.62);
      color: #fff;
      font: 700 14px/1.2 "Microsoft JhengHei", system-ui, sans-serif;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
    }
    .map-back-btn:hover { filter: brightness(1.12); }
  </style>
</head>
<body>
  <a class="map-back-btn" href="../大冒險地圖/index.html">← 回到大地圖</a>

  <div class="page">
    <header>
      <div>
        <h1>朝代配對</h1>
        <p class="subtitle">把右邊歷史事件拖到正確朝代。每次拖放都會計入嘗試次數。</p>
      </div>
      <div class="stats" aria-live="polite">
        <span>嘗試次數</span>
        <strong id="attempts">0</strong>
      </div>
    </header>

    <main class="game">
      <section class="panel">
        <div class="panel-title">
          <h2>左欄：朝代卡格</h2>
          <span class="panel-note">正確事件會鎖定堆疊</span>
        </div>
        <div class="dynasties" id="dynasties"></div>
      </section>

      <section class="panel events-panel">
        <div class="panel-title">
          <h2>右欄：事件卡</h2>
          <span class="panel-note" id="remainingText">尚有 16 張</span>
        </div>
        <div class="events" id="events">
          <div class="empty-message">事件全部配對完成</div>
        </div>
      </section>
    </main>
  </div>

  <div class="win-overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="win-box">
      <h2 id="winTitle">過關！</h2>
      <p>金榜題名，全部事件都配對成功。</p>
      <p>總嘗試次數：<strong id="finalAttempts">0</strong></p>
      <button class="again" id="again">再玩一次</button>
    </div>
  </div>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: 'e1',  dynasty_id: 1, text: "統一六國",     icon: "⚔️" },
      { id: 'e2',  dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: 'e3',  dynasty_id: 1, text: "焚書坑儒",     icon: "🔥" },
      { id: 'e4',  dynasty_id: 2, text: "張騫通西域",   icon: "🐪" },
      { id: 'e5',  dynasty_id: 2, text: "文景之治",     icon: "📜" },
      { id: 'e6',  dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: 'e7',  dynasty_id: 3, text: "貞觀之治",     icon: "👑" },
      { id: 'e8',  dynasty_id: 3, text: "安史之亂",     icon: "💥" },
      { id: 'e9',  dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: 'e10', dynasty_id: 4, text: "王安石變法",   icon: "📜" },
      { id: 'e11', dynasty_id: 4, text: "岳飛抗金",     icon: "🗡️" },
      { id: 'e12', dynasty_id: 5, text: "鄭和下西洋",   icon: "⛵" },
      { id: 'e13', dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
      { id: 'e14', dynasty_id: 6, text: "鴉片戰爭",     icon: "💣" },
      { id: 'e15', dynasty_id: 6, text: "康熙盛世",     icon: "🌅" },
      { id: 'e16', dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
    ];

    const dynastiesEl = document.getElementById('dynasties');
    const eventsEl = document.getElementById('events');
    const attemptsEl = document.getElementById('attempts');
    const remainingText = document.getElementById('remainingText');
    const winOverlay = document.getElementById('winOverlay');
    const finalAttempts = document.getElementById('finalAttempts');
    const again = document.getElementById('again');

    let attempts = 0;
    let matched = 0;
    let draggedId = null;

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function render() {
      attempts = 0;
      matched = 0;
      draggedId = null;
      attemptsEl.textContent = attempts;
      winOverlay.classList.remove('show');
      dynastiesEl.innerHTML = '';
      eventsEl.querySelectorAll('.event-card').forEach(card => card.remove());
      eventsEl.classList.remove('done');

      dynasties.forEach(dynasty => {
        const card = document.createElement('article');
        card.className = 'dynasty-card';
        card.innerHTML = '<div class="dynasty-name">' + dynasty.name + '</div><div class="drop-zone" data-dynasty-id="' + dynasty.id + '"></div>';
        dynastiesEl.appendChild(card);
      });

      shuffle(events).forEach(eventItem => {
        eventsEl.insertBefore(createEventCard(eventItem), eventsEl.querySelector('.empty-message'));
      });

      setupDropZones();
      updateRemaining();
    }

    function createEventCard(eventItem) {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.draggable = true;
      card.dataset.eventId = eventItem.id;
      card.dataset.dynastyId = eventItem.dynasty_id;
      card.innerHTML = '<span class="icon">' + eventItem.icon + '</span><span class="text">' + eventItem.text + '</span>';
      card.addEventListener('dragstart', event => {
        draggedId = eventItem.id;
        event.dataTransfer.setData('text/plain', eventItem.id);
        event.dataTransfer.effectAllowed = 'move';
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });
      return card;
    }

    function setupDropZones() {
      document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', event => {
          event.preventDefault();
          zone.classList.add('over');
        });

        zone.addEventListener('dragleave', () => {
          zone.classList.remove('over');
        });

        zone.addEventListener('drop', event => {
          event.preventDefault();
          zone.classList.remove('over');
          const id = event.dataTransfer.getData('text/plain') || draggedId;
          const card = document.querySelector('[data-event-id="' + id + '"]');
          if (!card || card.classList.contains('correct')) return;
          attempts += 1;
          attemptsEl.textContent = attempts;
          const targetDynasty = Number(zone.dataset.dynastyId);
          const cardDynasty = Number(card.dataset.dynastyId);

          if (targetDynasty === cardDynasty) {
            card.classList.add('correct');
            card.draggable = false;
            zone.appendChild(card);
            zone.classList.add('has-cards');
            matched += 1;
            updateRemaining();
            if (matched === events.length) showWin();
          } else {
            flashWrong(card);
          }
        });
      });
    }

    function flashWrong(card) {
      card.classList.remove('wrong');
      void card.offsetWidth;
      card.classList.add('wrong');
      setTimeout(() => card.classList.remove('wrong'), 320);
    }

    function updateRemaining() {
      const remaining = events.length - matched;
      remainingText.textContent = '尚有 ' + remaining + ' 張';
      eventsEl.classList.toggle('done', remaining === 0);
    }

    function showWin() {
      try { localStorage.setItem('cert_dynasty', '1'); } catch (error) {}
      finalAttempts.textContent = attempts;
      winOverlay.classList.add('show');
      again.focus();
    }

    again.addEventListener('click', render);
    render();
  </script>
</body>
</html>
